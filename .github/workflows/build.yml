name: Build & Publish EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify .NET SDK
        shell: pwsh
        run: |
          $info = dotnet --info 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "No .NET SDK found. Please ensure a .NET SDK is installed. Download: https://aka.ms/dotnet-download"
            exit 1
          }
          Write-Host $info

      - name: Restore
        run: dotnet restore CatCalculate.csproj

      - name: Build (debug check)
        run: dotnet build CatCalculate.csproj --no-restore -c Debug

      - name: Publish single-file EXE
        run: |
          dotnet publish CatCalculate.csproj `
            --no-restore `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatCalculate-win-x64
          path: publish/CatCalculate.exe
          if-no-files-found: error
